syntax = "proto3";
package pb;
option go_package = "./pb";
/*
存储
*/
message Base_Auth_GameInfo{
  string GameId =1;
  string GameType=2;
  string GameAddress=3;
}

/*
  登录授权服务器协议
  1:http请求授权登录

*/
message Net_Auth_LoginReq
{
  string  DeviceId = 1;//设备Id
  string  FacebookId = 2;
  string  AppleId = 3;//
  //string  HmsId=4;
  string FacebookName = 5;
}
message Net_Auth_LoginRet
{
  int32 Ret =1;//0:登录成功;1:凭据错误;2:重新链接失败;3:跨日;
  string ErrorMessage=2;//错误代码
  string AuthToken = 3;//登录凭证 Credential
  string GameServerAddress =4;//负载均衡后分配-->连接游戏服务器地址

}

message Net_Auth_LogoutReq
{
  string AuthToken = 1;  //登录凭证
}
message Net_Auth_LogoutRet
{
  int32 Ret =1;//0:登出成功;
}
//注册
message Net_Auth_RegisterReq{

}
message Net_Auth_RegisterRet{

}



