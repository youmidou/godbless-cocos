//-------------------------------------------进入俱乐部--------------------------------------------
// 进入俱乐部(C -> S)
message Net_Club_EnterClubReq
{
    string key = 1;// 俱乐部唯一标识
}

// 进入俱乐部(S -> C)
message Net_Club_EnterClubRet
{
    int32 result = 1;// 结果
    string clubKey = 2;// 俱乐部唯一标识
    string clubName = 3;// 俱乐部名称
    int32 zw = 4; // 自身职位(0、馆主 1、管理员+队长 2、管理员+队长 3、队长 10、普通玩家)
    double cent = 5; // 自身积分
    string notice = 6;// 公告
    int32 curatorRoomCardNum = 7;// 馆主房卡数
}

//-------------------------------------------获取自身所有俱乐部简介--------------------------------------------
// 俱乐部简介
message Base_Club_ClubBlurbInfo
{
    // 俱乐部唯一标识
    string key = 1;

    // 俱乐部名称
    string name = 2;

    // 身份
    int32 identity = 3;

    // 当前在线人数
    int32 onlineNum = 4;

    // 俱乐部人数
    int32 memberNum = 5;
}

// 获取自身所有俱乐部基础信息(C -> S)
message Net_Club_GetSelfAllClubBlurbReq
{
}

// 获取自身所有俱乐部基础信息(S -> C)
message Net_Club_GetSelfAllClubBlurbRet
{
    repeated Base_Club_ClubBlurbInfo clubs = 1;// 所有俱乐部
}

//-------------------------------------------俱乐部设置信息--------------------------------------------
// 俱乐部设置信息
message Base_Club_ClubSetInfo
{
    // 名称
    string name = 1;

    // 积分
    double cent = 2;

    // 公告
    string notice = 3;
}

// 获取俱乐部设置信息(C -> S)
message Net_Club_GetClubSetInfoReq
{
}

// 获取俱乐部设置信息(S -> C)
message Net_Club_GetClubSetInfoRet
{
    int32 result = 1;// 结果
    Base_Club_ClubSetInfo info = 2;// 设置信息
}

// 编辑俱乐部设置信息(C -> S)
message Net_Club_EditClubSetInfoReq
{
    Base_Club_ClubSetInfo info = 1;// 设置信息
}

// 编辑俱乐部设置信息(S -> C)
message Net_Club_EditClubSetInfoRet
{
    int32 result = 1; // 结果
    Base_Club_ClubSetInfo info = 2;// 设置信息
    double carryCent = 3;// 携带积分
}

//-------------------------------------------保险柜--------------------------------------------
// 保险柜记录
message ClubRankRecord
{
    // 操作积分(+存 -取)
    double operateCent = 1;

    // 总积分
    double totalCent = 2;

    // 时间戳
    int32 time = 3;
}

// 获取保险柜记录(C -> S)
message Net_Club_GetClubRankRecordsReq
{
}

// 获取保险柜记录(S -> C)
message Net_Club_GetClubRankRecordsRet
{
    int32 result = 1; // 结果
    repeated ClubRankRecord records = 2;// 记录信息
}

// 获取保险积分(C -> S)
message Net_Club_GetClubRankCentReq
{
}

// 获取保险积分(S -> C)
message Net_Club_GetClubRankCentRet
{
    int32 result = 1;// 结果
    double carryCent = 2;// 携带积分
    double bankCent = 3;// 保险柜积分
}

// 修改保险积分(C -> S)
message Net_Club_ModifyClubRankCentReq
{
    // 操作积分(+存 -取)
    string cent = 1;
}

// 修改保险积分(S -> C)
message Net_Club_ModifyClubRankCentRet
{
    // 结果
    int32 result = 1;

    // 携带积分
    double carryCent = 2;

    // 保险柜积分
    double bankCent = 3;
}

//-------------------------------------------馆长、管理员、队长修改积分--------------------------------------------
// 获取修改前积分信息(C -> S)
message Net_Club_GetModifyClubMemberCentReq
{
    // 目标玩家唯一标识
    string targetPpk = 1;
}

// 获取修改前积分信息(S -> C)
message Net_Club_GetModifyClubMemberCentRet
{
    // 结果
    int32 result = 1;
    
    // 自身积分
    double selfCent = 2;

    // 目标玩家唯一标识
    string targetPpk = 3;

    // 目标玩家头像地址
    string targetAvatorUrl = 4;

    // 目标玩家昵称
    string targetNickName = 5;

    // 目标玩家积分
    double targetCent = 6;
}

// 修改成员积分(C -> S)
message Net_Club_ModifyClubMemberCentReq
{
    // 目标玩家唯一标识
    string ppk = 1;

    // 修改值(> 0 目标玩家增加 < 0目标玩家减少 = 0设置为0)
    string changeCent = 2;
}

// 修改成员积分(S -> C)
message Net_Club_ModifyClubMemberCentRet
{
    // 结果
    int32 result = 1;
    
    // 自身积分
    double selfCent = 2;

    // 目标玩家积分
    double targetCent = 6;
}

// 成员积分变化记录
message Base_Club_ClubMemberCentChangeRecord
{
    // 操作者唯一标识
    string operatePpk = 1;

    // 操作者头像地址
    string operateAvatorUrl = 2;

    // 操作者昵称
    string operateNickName = 3;

    // 对象唯一标识
    string targetPpk = 4;

    // 对象头像地址
    string targetAvatorUrl = 5;

    // 对象昵称
    string targetNickName = 6;

    // 改变积分
    double changeCent = 7;

    // 总积分
    double totalCent = 8;

    // 事件类型(1、加减分 2、退出 3、踢出 4、房费分成 5、保底分成 6、保底  7、系统)
    int32 eventType = 9;

    // 时间戳
    int32 time = 10;
}

// 获取积分变化记录(C -> S)
message Net_Club_GetClubMemberCentChangeRecordReq
{
    // 类型(1、积分变化 2、分成)
    int32 type = 1;

    // 当前页数(从1开始)
    int32 page = 2;

    // 每页显示最大条数
    int32 perPageMax = 3;
}

// 获取积分变化记录(S -> C)
message Net_Club_GetClubMemberCentChangeRecordRet
{
    // 结果
    int32 result = 1;

    // 类型
    int32 type = 2;

    // 总记录数
    int32 total = 3;

    // 记录集合
    repeated Base_Club_ClubMemberCentChangeRecord records = 4;
}

//-------------------------------------------战绩--------------------------------------------
// 获取俱乐部成员战绩记录(C -> S)
message Net_Club_GetClubMemberGameRecordReq
{
    // 目标玩家唯一标识(未空代表是自己)
    string targetPpk = 1;

    // 当前页数(从1开始)
    int32 page = 2;

    // 每页显示最大条数
    int32 perPageMax = 3;
}

//-------------------------------------------成员贡献记录--------------------------------------------
// 成员贡献记录
message Base_Club_ClubMemberContributionRecord
{
    // 唯一标识
    string ppk = 1;

    // 头像地址
    string avatorUrl = 2;

    // 昵称
    string nickName = 3;

    // 局数
    int32 gameNum = 4;

    // 贡献
    double contribution = 5;

    // 个人总积分
    double personTotalCent = 6;

    // 预警值
    int32 warningValue = 7;

    // 职位
    int32 identity = 8;
}

// 获取俱乐部成员贡献记录(C -> S)
message Net_Club_GetClubMemberContributionRecordReq
{
    // 当前页数(从1开始)
    int32 page = 1;

    // 每页显示最大条数
    int32 perPageMax = 2;

    // 类型(1、天  2、周)
    int32 type = 3;

    // 每天或每周凌点时间
    int32 zeroTime = 4;
}

// 获取俱乐部成员贡献记录(S -> C)
message Net_Club_GetClubMemberContributionRecordRet
{
    // 结果
    int32 result = 1;

    // 总记录数
    int32 total = 2;

    // 记录集合
    repeated Base_Club_ClubMemberContributionRecord records = 3;
}

//-------------------------------------------队长贡献记录--------------------------------------------
// 队长贡献记录
message Base_Club_ClubTeamContributionRecord
{
    // 唯一标识
    string ppk = 1;

    // 头像地址
    string avatorUrl = 2;

    // 昵称
    string nickName = 3;

    // 局数
    int32 gameNum = 4;

    // 贡献
    double contribution = 5;

    // 个人总积分
    double personTotalCent = 6;

    // 团队总积分
    double teamTotalCent = 7;

    // 当前人数
    int32 onlineNum = 8;

    // 最大人数
    int32 maxNum = 9;

    // 预警值
    int32 warningValue = 10;

    // 房费比例值
    int32 roomFeeRatioValue = 11;

    // 职位
    int32 identity = 12;
}

// 获取俱乐部队长贡献记录(C -> S)
message Net_Club_GetClubTeamContributionRecordReq
{
    // 当前页数(从1开始)
    int32 page = 1;

    // 每页显示最大条数
    int32 perPageMax = 2;

    // 类型(1、天  2、周)
    int32 type = 3;

    // 每天或每周凌点时间
    int32 zeroTime = 4;
}

// 获取俱乐部队长贡献记录(S -> C)
message Net_Club_GetClubTeamContributionRecordRet
{
    // 结果
    int32 result = 1;

    // 总记录数
    int32 total = 2;

    // 记录集合
    repeated Base_Club_ClubTeamContributionRecord records = 3;
}

//-------------------------------------------申请加入俱乐部--------------------------------------------
// 申请加入俱乐部(C -> S)
message Net_Club_ApplyJoinClubReq
{
    // 俱乐部唯一标识
    string key = 1;
}

// 申请加入俱乐部(S -> C)
message Net_Club_ApplyJoinClubRet
{
    // 结果
    int32 result = 1;
}

//-------------------------------------------修改俱乐部成员身份--------------------------------------------
// 修改俱乐部成员身份(C -> S)
message Net_Club_ChangeClubMemberIdentityReq
{
    // 玩家唯一标识
    string ppk = 1;

    // 原身份
    int32 oidentity = 2;

    // 新身份
    int32 nidentity = 3;
}

// 修改俱乐部成员身份(S -> C)
message Net_Club_ChangeClubMemberIdentityRet
{
    // 结果
    int32 result = 1;

    // 新身份
    int32 identity = 2;
}

//-------------------------------------------创建俱乐部--------------------------------------------
// 创建俱乐部(C -> S)
message Net_Club_CreateClubReq
{
    // 俱乐部名称
    string name = 1;
}

// 创建俱乐部(S -> C)
message Net_Club_CreateClubRet
{
    // 结果
    int32 result = 1;
}

//-------------------------------------------解散俱乐部--------------------------------------------
// 解散俱乐部(C -> S)
message Net_Club_DissloveClubReq
{
}

// 解散俱乐部(S -> C)
message Net_Club_DissloveClubRet
{
    // 俱乐部唯一标识
    string key = 1;

    // 结果
    int32 result = 2;
}

//-------------------------------------------踢出俱乐部--------------------------------------------
// 踢出俱乐部(C -> S)
message Net_Club_KickOutClubReq
{
    // 被踢出者唯一标识
    string targetPpk = 1;
}

// 踢出俱乐部(S -> C)
message Net_Club_KickOutClubRet
{
    // 结果
    int32 result = 1;

    // 总积分
    double totalCent = 2;
}

//-------------------------------------------离开俱乐部--------------------------------------------
// 离开俱乐部(C -> S)
message Net_Club_LeaveClubReq
{
}

// 离开俱乐部(S -> C)
message Net_Club_LeaveClubRet
{
    // 结果
    int32 result = 1;
}

//-------------------------------------------邀请加入俱乐部--------------------------------------------
// 邀请加入俱乐部(C -> S)
message Net_Club_InviteJoinClubReq
{
    // 邀请加入者唯一标识
    string ppk = 1;
}

// 邀请加入俱乐部(S -> C)
message Net_Club_InviteJoinClubRet
{
    // 结果
    int32 result = 1;
}

//-------------------------------------------获取俱乐部成员--------------------------------------------
// 俱乐部成员信息
message Base_Club_ClubMemberInfo
{
    // 自身唯一标识
    string selfPpk = 1;

    // 自身头像地址
    string selfAvatorUrl = 2;

    // 自身昵称
    string selfNickName = 3;

    // 上级唯一标识
    string parentPpk = 4;

    // 上级头像地址
    string parentAvatorUrl = 5;

    // 上级昵称
    string parentNickName = 6;

    // 身份
    int32 level = 7;

    // 积分
    double cent = 8;
}

// 获取俱乐部成员(C -> S)
message Net_Club_GetClubMembersReq
{
    // 当前页数(从1开始)
    int32 page = 1;

    // 每页显示最大条数
    int32 perPageMax = 2;
}

// 获取俱乐部成员(S -> C)
message Net_Club_GetClubMembersRet
{
    // 结果
    int32 result = 1;

    // 总成员数
    int32 total = 2;

    // 成员信息集合
    repeated Base_Club_ClubMemberInfo members = 3;
}

//-------------------------------------------修改房费值--------------------------------------------
// 修改房费值(C -> S)
message Net_Club_ModifyClubRoomFeeRatioValueReq
{
    // 目标玩家唯一标识
    string ppk = 1;
    // 房费比例值
    int32 roomFeeRatioValue = 2;
}

// 修改房费值(S -> C)
message Net_Club_ModifyClubRoomFeeRatioValueRet
{
    // 结果
    int32 result = 1;
    // 房费比例值
    int32 roomFeeRatioValue = 2;
}

//-------------------------------------------修改预警值--------------------------------------------
// 修改预警值(C -> S)
message Net_Club_ModifyClubWarnCentReq
{
    // 目标玩家唯一标识
    string ppk = 1;
    // 预警值
    int32 warningValue = 2;
}

// 修改预警值(S -> C)
message Net_Club_ModifyClubWarnCentRet
{
    // 结果
    int32 result = 1;
    // 预警值
    int32 warningValue = 2;
}

//-------------------------------------------俱乐部房间--------------------------------------------
// 房费收取条件
message Base_Club_ClubRoomFeeCondition
{
    // 起始征收
    double minWin = 1;

    // 消耗
    double cost = 2;

    // 保底
    double bd = 3;
}

// 房费规则
message Base_Club_ClubRoomFeeRule
{
    // 收取对象(1、所有赢家 2、大赢家 3、前二赢家 4、前三赢家)
    int32 type = 1;

    // 房费收取规则
    repeated Base_Club_ClubRoomFeeCondition conditions = 2;
}

// 模版房间
message Base_Club_ClubRoomRuleRoom
{
    // 唯一标识
    int32 uid = 1;

    // 游戏类型
    int32 gameType = 2;

    // 房间名称
    string name = 3;

    // 规则ID集合
    repeated int32 ruleIds = 4;

    // 房费规则
    Base_Club_ClubRoomFeeRule rule = 5;

    // 开桌数
    int32 createdRoomNum = 6;

    // 是否激活
    bool isActive = 7;

    // 底注
    double baseNum = 8;

    // 入场分
    double enterNum = 9;

    // 离场分
    double leaveNum = 10;

    // 房间最大人数
    int32 maxMemberNum = 11;
}

// 获取俱乐部所有房间模版规则(C -> S)
message Net_Club_ClubRoomGetAllRuleReq
{
}

// 创建俱乐部房间模版规则(S -> C)
message Net_Club_ClubRoomGetAllRuleRet
{
    // 结果
    int32 result = 1;

    // 房间集合
    repeated Base_Club_ClubRoomRuleRoom ruleRooms = 2;
}

// 创建俱乐部房间模版规则(C -> S)
message Net_Club_ClubRoomCreateRuleReq
{
    // 地区
    int32 area = 1;

    // 房间规则
    Base_Club_ClubRoomRuleRoom ruleRoom = 2;
}

// 创建俱乐部房间模版规则(S -> C)
message Net_Club_ClubRoomCreateRuleRet
{
    // 结果
    int32 result = 1;
}

// 删除俱乐部房间模版规则(C -> S)
message Net_Club_ClubRoomRemoveRuleReq
{
    // 唯一标识
    int32 uid = 1;
}

// 删除俱乐部房间模版规则(S -> C)
message Net_Club_ClubRoomRemoveRuleRet
{
    // 结果
    int32 result = 1;
}

// 设置规则模版房间激活状态(C -> S)
message Net_Club_ClubRoomSetRuleRoomActiveReq
{
    // 唯一标识
    int32 uid = 1;
    // 是否开启
    bool isActive = 2;
}

// 设置规则模版房间激活状态(S -> C)
message Net_Club_ClubRoomSetRuleRoomActiveRet
{
    // 结果
    int32 result = 1;
}

// 关闭俱乐部(C -> S)
message Net_Club_ClubRoomCloseClubReq
{
}

// 关闭俱乐部(S -> C)
message Net_Club_ClubRoomCloseClubRet
{
    // 结果
    int32 result = 1;
}

